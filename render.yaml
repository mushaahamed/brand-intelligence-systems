services:
  - type: web
    name: brandscope
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: APIFY_TOKEN_1
        sync: false
      - key: APIFY_TOKEN_2
        sync: false
      - key: APIFY_TOKEN_3
        sync: false
      - key: APIFY_TOKEN_4
        sync: false
      - key: APIFY_TOKEN_5
        sync: false
      - key: HUNTER_API_KEY
        sync: false
      - key: OUTPUT_DIR
        value: /tmp/outputs
